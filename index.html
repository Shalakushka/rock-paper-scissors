<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Rock Paper Scissors</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Kanit">
    </head>
    <body>
        <header>Rock Paper Scissors</header>
        <main>
            <div class="player-selection">
                Player
                <button class="rock">👊</button>
                <button class="paper">✋</button>
                <button class="scissors">✌️</button>
            </div>
            <div class="board">
                <div class="status">Pick one ...</div>
                <div class="fight">
                    <div class="player-choice"></div>
                    <img src="./img/wait.png" alt="Fight Icon">
                    <div class="computer-choice"></div>
                </div>
            </div>
            <div class="computer-selection">
                Computer
                <button class="rock">👊</button>
                <button class="paper">✋</button>
                <button class="scissors">✌️</button>
            </div>
        </main>
        <footer><a href="https://github.com/Shalakushka">@Shalakushka</a></footer>
    </body>
</html>
